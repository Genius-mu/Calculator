<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculator</title>
    <link rel="stylesheet" href="index.css" type="text/css" />
  </head>

  <body>
    <div class="calculator">
      <input id="display" readonly />
      <div id="keys">
        <button onclick="appearToDisplay('+')" class="operator-btn">+</button>
        <button onclick="appearToDisplay('7')">7</button>
        <button onclick="appearToDisplay('8')">8</button>
        <button onclick="appearToDisplay('9')">9</button>
        <button onclick="appearToDisplay('-')" class="operator-btn">-</button>
        <button onclick="appearToDisplay('4')">4</button>
        <button onclick="appearToDisplay('5')">5</button>
        <button onclick="appearToDisplay('6')">6</button>
        <button onclick="appearToDisplay('*')" class="operator-btn">x</button>
        <button onclick="appearToDisplay('1')">1</button>
        <button onclick="appearToDisplay('2')">2</button>
        <button onclick="appearToDisplay('3')">3</button>
        <button onclick="appearToDisplay('/')" class="operator-btn">÷</button>
        <button onclick="appearToDisplay('0')">0</button>
        <button onclick="appearToDisplay('.')">.</button>
        <button onclick="calculate('=')" id="equal">=</button>
        <button onclick="clearDisplay('C')" class="operator-btn" id="clear">
          C
        </button>
      </div>
    </div>
  </body>
  <script src="index.js"></script>
</html>
